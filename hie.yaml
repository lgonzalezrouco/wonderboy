# Explicit cradle paths help haskell-language-server pick the right Cabal component
# (library vs executable vs test) when editing files under src/, app/, or test/.
cradle:
  multi:
    - path: "./src"
      config:
        cradle:
          cabal:
            component: "lib:wonderboy-hs"
    - path: "./app"
      config:
        cradle:
          cabal:
            component: "exe:wonderboy-hs"
    - path: "./test"
      config:
        cradle:
          cabal:
            component: "test:wonderboy-hs-test"
