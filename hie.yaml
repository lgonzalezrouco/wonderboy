# Cradle paths for haskell-language-server.
cradle:
  multi:
    - path: "./src"
      config:
        cradle:
          cabal:
            component: "lib:wonderboy-hs"
    - path: "./app"
      config:
        cradle:
          cabal:
            component: "exe:wonderboy-hs"
    - path: "./test"
      config:
        cradle:
          cabal:
            component: "test:wonderboy-hs-test"
