# CI for wonderboy-hs: Cabal build/tests, package sanity, docs, HLint, Fourmolu,
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  haskell:
    name: Haskell (build, test, haddock, HLint, Fourmolu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        id: setup-haskell
        with:
          ghc-version: "9.6"
          cabal-version: "3.12"

      - name: Cache Cabal store and build dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-${{ steps.setup-haskell.outputs.ghc-version }}-cabal-${{ hashFiles('**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ steps.setup-haskell.outputs.ghc-version }}-cabal-

      - name: Cabal update
        run: cabal update

      - name: Configure and build (with tests)
        run: cabal build all --enable-tests

      - name: Run test suite
        run: cabal test all --test-show-details=direct

      - name: Validate .cabal package description
        run: cabal check

      - name: Build Haddock (catch broken docs early)
        run: cabal haddock all --enable-documentation --haddock-html --haddock-quickjump

      - name: Install Fourmolu
        run: |
          cabal install fourmolu-0.16.2.0 \
            --overwrite-policy=always \
            --installdir="$HOME/.local/bin" \
            --install-method=copy
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: HLint
        run: curl -sSL https://raw.github.com/ndmitchell/hlint/master/misc/run.sh | sh -s src app test

      - name: Fourmolu (check only)
        run: fourmolu --mode check src app test
