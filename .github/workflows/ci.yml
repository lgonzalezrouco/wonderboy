# CI for wonderboy-hs: Cabal build/tests, package sanity, docs, HLint, Fourmolu,
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  haskell:
    name: Haskell (build, test, haddock, HLint, Fourmolu)
    runs-on: ubuntu-latest
    env:
      GHC_VERSION: "9.6.7"

    steps:
      - uses: actions/checkout@v7

      - name: Install OpenGL / GLUT (Gloss on Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev freeglut3-dev

      - name: Fix ghcup directory permissions (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo mkdir -p /usr/local/.ghcup
          sudo chown -R "$USER:$USER" /usr/local/.ghcup

      - name: Cache GHC (ghcup)
        uses: actions/cache@v6
        with:
          path: |
            /usr/local/.ghcup
            ~/.ghcup
          key: ghcup-${{ runner.os }}-ghc-${{ env.GHC_VERSION }}
          restore-keys: |
            ghcup-${{ runner.os }}-ghc-${{ env.GHC_VERSION }}-

      - uses: haskell-actions/setup@v2
        id: setup-haskell
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: "3.12"
          cabal-update: false

      - name: Cache Cabal package index
        uses: actions/cache@v6
        with:
          path: ~/.cabal/packages
          key: cabal-packages-${{ runner.os }}
          restore-keys: |
            cabal-packages-${{ runner.os }}

      - name: Cache Cabal store
        uses: actions/cache@v6
        with:
          path: ~/.cabal/store
          key: ${{ runner.os }}-ghc-${{ steps.setup-haskell.outputs.ghc-version }}-cabal-store-${{ hashFiles('cabal.project', '**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ steps.setup-haskell.outputs.ghc-version }}-cabal-store-

      - name: Cache Cabal build dir
        uses: actions/cache@v6
        with:
          path: dist-newstyle
          key: ${{ runner.os }}-ghc-${{ steps.setup-haskell.outputs.ghc-version }}-dist-ci-${{ hashFiles('cabal.project', '**/*.cabal', 'src/**', 'app/**', 'test/**') }}

      - name: Cabal update
        run: cabal update

      - name: Configure and build (with tests)
        run: cabal build all --enable-tests

      - name: Run test suite
        run: cabal test all --test-show-details=direct

      - name: Validate .cabal package description
        run: cabal check

      - name: Build Haddock (catch broken docs early)
        run: cabal haddock all --enable-documentation --haddock-html --haddock-quickjump

      - name: Cache Fourmolu
        id: cache-fourmolu
        uses: actions/cache@v6
        with:
          path: ~/.local/bin/fourmolu
          key: fourmolu-0.16.2.0-megaparsec-lt9.8-${{ runner.os }}

      - name: Install Fourmolu
        if: steps.cache-fourmolu.outputs.cache-hit != 'true'
        run: |
          # megaparsec-9.8.0 drops the foldl' import but still uses it; that
          # breaks on GHC 9.6 (foldl' is not in Prelude until GHC 9.10).
          cabal install fourmolu-0.16.2.0 \
            --constraint='megaparsec<9.8' \
            --overwrite-policy=always \
            --installdir="$HOME/.local/bin" \
            --install-method=copy

      - name: Cache HLint
        id: cache-hlint
        uses: actions/cache@v6
        with:
          path: ~/.local/bin/hlint
          key: hlint-3.8-${{ runner.os }}-ghc-${{ steps.setup-haskell.outputs.ghc-version }}

      - name: Install HLint
        if: steps.cache-hlint.outputs.cache-hit != 'true'
        run: |
          cabal install hlint-3.8 \
            --overwrite-policy=always \
            --installdir="$HOME/.local/bin" \
            --install-method=copy

      - name: Add tool binaries to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: HLint
        run: hlint src app test

      - name: Fourmolu (check only)
        run: fourmolu --mode check src app test
