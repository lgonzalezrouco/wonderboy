# CI for wonderboy-hs: Cabal build/tests, package sanity, docs, HLint, Fourmolu,
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  haskell:
    name: Haskell (build, test, haddock, HLint, Fourmolu)
    runs-on: ubuntu-latest
    env:
      GHC_VERSION: "9.6.7"

    steps:
      - uses: actions/checkout@v4

      - name: Install OpenGL / GLUT (Gloss on Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev freeglut3-dev

      - name: Fix ghcup directory permissions (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo mkdir -p /usr/local/.ghcup
          sudo chown -R "$USER:$USER" /usr/local/.ghcup

      - name: Cache GHC (ghcup)
        uses: actions/cache@v4
        with:
          path: /usr/local/.ghcup
          key: ghcup-${{ runner.os }}-ghc-${{ env.GHC_VERSION }}
          restore-keys: |
            ghcup-${{ runner.os }}-ghc-${{ env.GHC_VERSION }}-

      - uses: haskell-actions/setup@v2
        id: setup-haskell
        with:
          ghc-version: ${{ env.GHC_VERSION }}
          cabal-version: "3.12"
          cabal-update: false

      - name: Cache Cabal store and build dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            dist-newstyle
          key: ${{ runner.os }}-ghc-${{ steps.setup-haskell.outputs.ghc-version }}-cabal-${{ hashFiles('**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-${{ steps.setup-haskell.outputs.ghc-version }}-cabal-

      - name: Cabal update
        run: cabal update

      - name: Configure and build (with tests)
        run: cabal build all --enable-tests

      - name: Run test suite
        run: cabal test all --test-show-details=direct

      - name: Validate .cabal package description
        run: cabal check

      - name: Build Haddock (catch broken docs early)
        run: cabal haddock all --enable-documentation --haddock-html --haddock-quickjump

      - name: Install Fourmolu
        run: |
          # megaparsec-9.8.0 drops the foldl' import but still uses it; that
          # breaks on GHC 9.6 (foldl' is not in Prelude until GHC 9.10).
          cabal install fourmolu-0.16.2.0 \
            --constraint='megaparsec<9.8' \
            --overwrite-policy=always \
            --installdir="$HOME/.local/bin" \
            --install-method=copy
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: HLint
        run: curl -sSL https://raw.github.com/ndmitchell/hlint/master/misc/run.sh | sh -s src app test

      - name: Fourmolu (check only)
        run: fourmolu --mode check src app test
